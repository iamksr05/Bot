services:
  - type: worker
    name: discord-bot
    env: node
    plan: starter
    buildCommand: npm install --ignore-scripts
    startCommand: node main.js
    envVars:
      - key: DISCORD_TOKEN
        fromSecret: discord-token
      - key: PREFIX
        sync: false
      - key: MONGOPATH
        sync: false
      - key: OPENAI_KEY
        sync: false